<VirtualHost *:80>
    ServerName unganishanetworks.com
    ServerAlias www.unganishanetworks.com
    ServerAdmin webmaster@unganishanetworks.com

    DocumentRoot /home/bryan/Symphony/public

    <Directory /home/bryan/Symphony/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Laravel specific settings
    <IfModule mod_rewrite.c>
        <Directory /home/bryan/Symphony/public>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [L]
        </Directory>
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/symphony-error.log
    CustomLog ${APACHE_LOG_DIR}/symphony-access.log combined
</VirtualHost>

